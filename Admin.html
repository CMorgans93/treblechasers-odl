<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>TrebleChasers ODL | Admin Panel</title>

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Inter,sans-serif;
      color:white;

      background:
        radial-gradient(circle at top,#08275c 0%,#031126 45%,#010814 100%);
    }

    .admin-wrap{
      width:min(1450px,94%);
      margin:20px auto 80px;
    }

    /* TOP */

    .top-banner{

      background:
        linear-gradient(
          145deg,
          rgba(4,26,59,.96),
          rgba(5,18,38,.96)
        );

      border:1px solid rgba(245,201,106,.16);

      border-radius:32px;

      overflow:hidden;

      margin-bottom:24px;

      box-shadow:
        0 24px 60px rgba(0,0,0,.5),
        0 0 28px rgba(215,180,106,.06);
    }

    .top-logo-wrap{
      display:flex;
      align-items:center;
      justify-content:center;

      padding:18px 16px 6px;
    }

    .top-logo{
      width:220px;
      max-width:72%;
      height:auto;
      object-fit:contain;

      filter:
        drop-shadow(0 10px 20px rgba(0,0,0,.4))
        drop-shadow(0 0 14px rgba(215,180,106,.14));
    }

    .top-content{
      padding:0 20px 20px;
      text-align:center;
    }

    .top-content h1{
      margin:0;
      font-size:44px;
      line-height:1;
      font-family:Oswald,sans-serif;
    }

    .top-content p{
      margin-top:10px;
      opacity:.68;
      font-size:17px;
    }

    /* GRID */

    .admin-grid{
      display:grid;
      grid-template-columns:300px 1fr;
      gap:20px;
      align-items:start;
    }

    /* SIDEBAR + MAIN */

    .admin-sidebar,
    .admin-main{

      background:
        linear-gradient(
          145deg,
          rgba(4,26,59,.95),
          rgba(6,18,38,.96)
        );

      border:1px solid rgba(245,201,106,.14);

      border-radius:28px;

      overflow:hidden;

      box-shadow:
        0 18px 50px rgba(0,0,0,.4),
        0 0 18px rgba(215,180,106,.04);
    }

    .admin-sidebar{
      padding:22px;
      position:sticky;
      top:20px;
    }

    .admin-main{
      padding:22px;
    }

    .admin-title{
      margin:0;
      font-size:52px;
      line-height:1;
      font-family:Oswald,sans-serif;
    }

    .admin-sub{
      margin-top:8px;
      opacity:.68;
    }

    .admin-section{
      margin-top:34px;
    }

    .admin-section h3{
      margin:0 0 14px;

      color:#f5c96a;

      font-size:15px;

      letter-spacing:.08em;

      text-transform:uppercase;
    }

    /* BUTTONS */

    .admin-btn{

      width:100%;

      margin-bottom:14px;

      padding:18px;

      border-radius:22px;

      border:1px solid rgba(245,201,106,.18);

      background:
        linear-gradient(
          180deg,
          rgba(24,58,108,.86),
          rgba(8,30,66,.96)
        );

      color:white;

      text-align:left;

      font-size:17px;

      cursor:pointer;

      transition:.18s ease;

      box-shadow:
        0 0 18px rgba(195,32,38,.12);
    }

    .admin-btn:hover,
    .admin-btn.active{

      transform:translateY(-2px);

      border-color:rgba(245,201,106,.42);

      box-shadow:
        0 0 22px rgba(195,32,38,.16),
        0 0 14px rgba(215,180,106,.08);
    }

    /* PANELS */

    .panel{
      display:none;
    }

    .panel.active{
      display:block;
    }

    .panel-card{

      background:
        linear-gradient(
          180deg,
          rgba(15,40,82,.88),
          rgba(7,24,52,.94)
        );

      border:1px solid rgba(255,255,255,.04);

      border-radius:28px;

      padding:24px;

      margin-bottom:22px;
    }

    .panel-card h4{
      margin:0 0 18px;
      font-size:24px;
    }

    /* QUICK STATS */

    .grid-3-admin{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
    }

    .quick-stat{

      background:
        linear-gradient(
          180deg,
          rgba(25,52,98,.92),
          rgba(13,34,72,.96)
        );

      border-radius:24px;

      padding:24px;

      border:1px solid rgba(255,255,255,.04);

      min-height:140px;
    }

    .quick-stat span{
      display:block;
      opacity:.7;
      font-size:.9rem;
      margin-bottom:14px;
    }

    .quick-stat strong{
      font-size:58px;
      line-height:1;
      font-family:Oswald,sans-serif;
    }

    /* SEARCH */

    .search-box{
      margin-bottom:18px;
    }

    .search-box input{

      width:100%;

      padding:18px 20px;

      border-radius:22px;

      border:1px solid rgba(245,201,106,.16);

      background:#031126;

      color:white;

      font-size:17px;

      outline:none;
    }

    /* TABLE */

    .admin-table-wrap{
      overflow-x:auto;
      border-radius:22px;
    }

    .admin-table{
      width:100%;
      min-width:1000px;
      border-collapse:collapse;
    }

    .admin-table th,
    .admin-table td{

      padding:18px 14px;

      border-bottom:1px solid rgba(255,255,255,.05);

      text-align:left;

      white-space:nowrap;
    }

    .admin-table th{

      color:#f5c96a;

      text-transform:uppercase;

      font-size:.76rem;

      letter-spacing:.08em;
    }

    /* MOBILE */

    @media(max-width:980px){

      .admin-grid{
        grid-template-columns:1fr;
      }

      .grid-3-admin{
        grid-template-columns:1fr;
      }

      .admin-sidebar{
        position:relative;
        top:auto;
      }

      .top-content h1{
        font-size:38px;
      }

      .quick-stat strong{
        font-size:52px;
      }
    }

  </style>
</head>

<body>

<main class="admin-wrap">

  <!-- TOP -->

  <section class="top-banner">

    <div class="top-logo-wrap">

      <img
        class="top-logo"
        src="./Assets/TrebleAssets/TrebleAssets_file_00000000564c72469e778dedad6ed082.png"
        alt="TrebleChasers ODL"
      />

    </div>

    <div class="top-content">

      <h1>TrebleChasers ODL</h1>

      <p>
        Admin Control Panel
      </p>

    </div>

  </section>

  <!-- GRID -->

  <div class="admin-grid">

    <!-- SIDEBAR -->

    <aside class="admin-sidebar">

      <h1 class="admin-title">
        Admin
      </h1>

      <p class="admin-sub">
        League management system
      </p>

      <div class="admin-section">

        <h3>Management</h3>

        <button class="admin-btn active">
          Players
        </button>

        <button class="admin-btn">
          Pending Results
        </button>

        <button class="admin-btn">
          Divisions
        </button>

        <button class="admin-btn">
          Season Controls
        </button>

      </div>

      <div class="admin-section">

        <h3>Tools</h3>

        <button class="admin-btn">
          Activity / Inactivity
        </button>

        <button class="admin-btn">
          League Settings
        </button>

      </div>

    </aside>

    <!-- MAIN -->

    <section class="admin-main">

      <div class="panel active">

        <div class="panel-card">

          <h4>League Overview</h4>

          <div class="grid-3-admin">

            <div class="quick-stat">
              <span>Total Players</span>
              <strong>0</strong>
            </div>

            <div class="quick-stat">
              <span>Members</span>
              <strong>0</strong>
            </div>

            <div class="quick-stat">
              <span>Inactive</span>
              <strong>0</strong>
            </div>

          </div>

        </div>

        <div class="panel-card">

          <div class="search-box">

            <input
              type="text"
              placeholder="Search players..."
            />

          </div>

          <div class="admin-table-wrap">

            <table class="admin-table">

<thead>

<tr>
  <th>Player</th>
  <th>Division</th>
  <th>Average</th>
  <th>ELO</th>
  <th>Member</th>
  <th>Status</th>
</tr>

</thead>

<tbody id="playersTableBody"></tbody>

            </table>

          </div>

        </div>

      </div>

    </section>

  </div>

</main>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtWUo8-OlZp8c06jhkEjRwyK1Q4s9GlaA",
  authDomain: "treblechasersodl-f7abe.firebaseapp.com",
  projectId: "treblechasersodl-f7abe",
  storageBucket: "treblechasersodl-f7abe.firebasestorage.app",
  messagingSenderId: "310895501905",
  appId: "1:310895501905:web:79412e33dc100781ea0e70",
  measurementId: "G-NY6D0EP97L"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadPlayers() {

  const snapshot = await getDocs(collection(db, "Players"));

  const players = [];

  snapshot.forEach((doc) => {
    players.push({ id: doc.id, ...doc.data() });
  });

  const statNumbers = document.querySelectorAll(".quick-stat strong");

const totalPlayers = players.length;

const totalMembers = players.filter(player => player.member === true).length;

const inactivePlayers = players.filter(
  player => player.status?.toLowerCase() === "inactive"
).length;

statNumbers[0].textContent = totalPlayers;
statNumbers[1].textContent = totalMembers;
statNumbers[2].textContent = inactivePlayers;

const tableBody = document.getElementById("playersTableBody");

tableBody.innerHTML = "";

players.forEach((player) => {

  tableBody.innerHTML += `

    <tr>
      <td>${player.name || "Unknown"}</td>
      <td>${player.division || "-"}</td>
      <td>${player.average || 0}</td>
      <td>${player.elo || 0}</td>
      <td>${player.member ? "Yes" : "No"}</td>
      <td>${player.status || "Unknown"}</td>
    </tr>

  `;

});

}

loadPlayers();

</script>
<script>
(function () {
  const routes = {
    "Players": "#players",
    "Pending Results": "#pending-results",
    "Divisions": "division.html",
    "Season Controls": "#season-controls",
    "Activity / Inactivity": "#activity",
    "League Settings": "#league-settings"
  };

  document.querySelectorAll("button, .btn, .tile, .admin-btn, .menu-item").forEach((el) => {
    const text = (el.textContent || "").trim();

    Object.keys(routes).forEach((label) => {
      if (text.includes(label)) {
        el.style.cursor = "pointer";

        el.addEventListener("click", () => {
          const route = routes[label];

          if (route.startsWith("#")) {
            alert(`${label} section is loaded visually but not built as a live panel yet.`);
            return;
          }

          window.location.href = route;
        });
      }
    });
  });

  console.log("Admin click pathways loaded");
})();
</script>
</body>
</html>
