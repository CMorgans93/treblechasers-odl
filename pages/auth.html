<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>TrebleChasers ODL | Player Access</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>

    :root{
      --gold:#f5c96a;
      --gold-dark:#d7a93d;
      --navy:#031126;
      --navy2:#08275c;
      --border:rgba(245,201,106,.18);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,sans-serif;
      color:white;

      background:
        radial-gradient(circle at top,#08275c 0%,#031126 45%,#010814 100%);

      display:flex;
      align-items:center;
      justify-content:center;

      padding:20px;
    }

    .auth-wrap{
      width:min(700px,100%);
    }

    .auth-card{

      background:
        linear-gradient(
          145deg,
          rgba(4,26,59,.96),
          rgba(5,18,38,.96)
        );

      border:1px solid var(--border);

      border-radius:32px;

      padding:34px;

      box-shadow:
        0 24px 60px rgba(0,0,0,.55);
    }

    .top{
      text-align:center;
      margin-bottom:28px;
    }

    .logo{
      width:110px;
      margin-bottom:16px;
    }

    h1{
      margin:0;
      font-family:"Bebas Neue",sans-serif;
      letter-spacing:1px;
      font-size:58px;
      line-height:1;
    }

    .sub{
      color:rgba(255,255,255,.72);
      margin-top:10px;
      line-height:1.6;
    }

    .tabs{
      display:flex;
      gap:12px;
      margin-bottom:26px;
    }

    .tab{
      flex:1;

      border:none;

      border-radius:16px;

      padding:14px;

      cursor:pointer;

      font-weight:900;

      color:white;

      background:
        linear-gradient(
          180deg,
          rgba(24,58,108,.88),
          rgba(8,30,66,.96)
        );

      border:1px solid rgba(245,201,106,.16);
    }

    .tab.active{
      background:
        linear-gradient(
          180deg,
          var(--gold),
          var(--gold-dark)
        );

      color:#06142b;
    }

    form{
      display:grid;
      gap:14px;
    }

    .hidden{
      display:none;
    }

    input{
      width:100%;

      background:#031126;

      border:1px solid rgba(245,201,106,.18);

      border-radius:16px;

      padding:15px;

      color:white;

      font-size:1rem;
    }

    input::placeholder{
      color:rgba(255,255,255,.45);
    }

    .submit-btn{
      margin-top:10px;

      border:none;

      border-radius:18px;

      padding:16px;

      font-weight:900;

      cursor:pointer;

      background:
        linear-gradient(
          180deg,
          var(--gold),
          var(--gold-dark)
        );

      color:#06142b;

      font-size:1rem;
    }

    .helper-links{
      display:flex;
      gap:12px;
      flex-wrap:wrap;

      margin-top:22px;
    }

    .helper-btn{
      flex:1;

      text-align:center;

      border-radius:16px;

      padding:14px;

      font-weight:800;

      border:1px solid rgba(245,201,106,.18);

      background:
        linear-gradient(
          180deg,
          rgba(24,58,108,.88),
          rgba(8,30,66,.96)
        );

      color:white;
    }

    .error{
      color:#ff7272;
      font-weight:700;
      min-height:18px;
      margin-top:-4px;
    }

    .back-home{
      margin-top:24px;
      text-align:center;
    }

    .back-home a{
      color:var(--gold);
      font-weight:800;
    }

    @media(max-width:700px){

      .auth-card{
        padding:24px;
      }

      h1{
        font-size:44px;
      }

      .helper-links{
        flex-direction:column;
      }

    }

  </style>
</head>

<body>

<div class="auth-wrap">

  <div class="auth-card">

    <div class="top">

      <img
        class="logo"
        src="../images/TrebleAssets_file_00000000564c72469e778dedad6ed082.png"
        alt="TrebleChasers ODL"
      >

      <h1>TrebleChasers ODL</h1>

      <div class="sub">
        Join the community, compete in divisions,
        tournaments and track your live rankings.
      </div>

    </div>

    <div class="tabs">

      <button id="loginTab" class="tab active">
        Log In
      </button>

      <button id="signupTab" class="tab">
        Sign Up
      </button>

    </div>

    <!-- LOGIN -->

    <form id="loginForm">

      <input
        id="loginEmail"
        type="email"
        placeholder="Email Address"
        required
      >

      <input
        id="loginPassword"
        type="password"
        placeholder="Password"
        required
      >

      <div id="loginError" class="error"></div>

      <button class="submit-btn" type="submit">
        Log In
      </button>

    </form>

    <!-- SIGNUP -->

    <form id="signupForm" class="hidden">

      <input
        id="signupName"
        type="text"
        placeholder="Full Name"
        required
      >

      <input
        id="signupDcUsername"
        type="text"
        placeholder="DartsCounter Username"
      >

      <input
        id="signupDcLink"
        type="text"
        placeholder="DartsCounter Profile Link"
      >

      <input
        id="signupAverage"
        type="number"
        step="0.01"
        placeholder="30 Day Average"
        required
      >

      <input
        id="signupEmail"
        type="email"
        placeholder="Email Address"
        required
      >

      <input
        id="signupPassword"
        type="password"
        placeholder="Password"
        required
      >

      <div id="signupError" class="error"></div>

      <button class="submit-btn" type="submit">
        Create Account
      </button>

    </form>

    <div class="helper-links">

      <a
        class="helper-btn"
        href="https://chat.whatsapp.com/HaBdXNvMO3yCasabzd0edk"
        target="_blank"
      >
        Join WhatsApp Community
      </a>

      <a
        class="helper-btn"
        href="https://www.dartscounter.net/"
        target="_blank"
      >
        Open DartsCounter
      </a>

    </div>

    <div class="back-home">
      <a href="../index.html">
        ← Back To Homepage
      </a>
    </div>

  </div>

</div>

<script type="module">

import { auth, db } from '../js/firebase-init.js';

import {
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword
} from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js';

import {
  doc,
  setDoc
} from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';

const loginTab = document.getElementById('loginTab');
const signupTab = document.getElementById('signupTab');

const loginForm = document.getElementById('loginForm');
const signupForm = document.getElementById('signupForm');

loginTab.addEventListener('click', () => {

  loginTab.classList.add('active');
  signupTab.classList.remove('active');

  loginForm.classList.remove('hidden');
  signupForm.classList.add('hidden');

});

signupTab.addEventListener('click', () => {

  signupTab.classList.add('active');
  loginTab.classList.remove('active');

  signupForm.classList.remove('hidden');
  loginForm.classList.add('hidden');

});

loginForm.addEventListener('submit', async (e) => {

  e.preventDefault();

  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  const errorEl = document.getElementById('loginError');

  errorEl.textContent = '';

  try{

    await signInWithEmailAndPassword(auth,email,password);

    window.location.href = '../index.html';

  }catch(err){

    errorEl.textContent = err.message;

  }

});

signupForm.addEventListener('submit', async (e) => {

  e.preventDefault();

  const name = document.getElementById('signupName').value;
  const dcUsername = document.getElementById('signupDcUsername').value;
  const dcLink = document.getElementById('signupDcLink').value;
  const avg = Number(document.getElementById('signupAverage').value);
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;

  const errorEl = document.getElementById('signupError');

  errorEl.textContent = '';

  try{

    const cred =
      await createUserWithEmailAndPassword(
        auth,
        email,
        password
      );

    await setDoc(doc(db,'users',cred.user.uid),{

      displayName:name,
      email,

      dcUsername,
      dcLink,

      avg,

      role:'player',

      elo:1000,

      powerRanking:1000,

      isMember:false,

      createdAt:new Date()

    });

    window.location.href = '../index.html';

  }catch(err){

    errorEl.textContent = err.message;

  }

});

</script>

</body>
</html>
